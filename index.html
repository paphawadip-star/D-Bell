<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR Musical Instruments Exhibit</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* UI สำหรับการโต้ตอบ (เกณฑ์ที่ 3 และ 4) */
        .ui-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 1000; width: 95%; justify-content: center;
        }
        button {
            padding: 15px 10px; border-radius: 12px; border: 2px solid #fff;
            background: rgba(0,0,0,0.8); color: white; cursor: pointer; 
            font-size: 14px; flex: 1; font-weight: bold; transition: 0.3s;
        }
        button:active { background: #FF5722; transform: scale(0.9); }
        
        .info-panel {
            position: fixed; top: 10px; left: 10px; right: 10px; color: white;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 15px; z-index: 1000;
            text-align: center; pointer-events: none; font-family: sans-serif;
        }
        /* สถานะกำลังโหลด */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: white; display: flex; align-items: center;
            justify-content: center; z-index: 2000; font-family: sans-serif;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="loading-screen">กำลังโหลดโมเดล AR...</div>

    <div class="info-panel">
        <h2 id="inst-title" style="margin:0;">🎹 Piano</h2>
        <p id="inst-desc" style="margin:5px 0 0 0; font-size: 14px;">เครื่องลิ่มนิ้วที่สร้างเสียงด้วยการค้อนเคาะสาย</p>
    </div>

    <div class="ui-container">
        <button onclick="switchInstrument('piano')">🎹<br>Piano</button>
        <button onclick="switchInstrument('guitar')">🎸<br>Guitar</button>
        <button onclick="switchInstrument('drum')">🎺<br>Trumpet</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720;"
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true;">
        
        <a-assets timeout="10000">
            <a-asset-item id="piano-model" src="piano.glb"></a-asset-item>
            <a-asset-item id="guitar-model" src="guitar.glb"></a-asset-item>
            <a-asset-item id="drum-model" src="trumpet.glb"></a-asset-item>
        </a-assets>
        
        <a-marker preset="hiro">
            <a-entity light="type: ambient; intensity: 1.2;"></a-entity>
            <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>

            <a-entity id="piano-group" visible="false"
                gltf-model="#piano-model"
                position="0 0 0" 
                scale="0.2 0.2 0.2"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
            </a-entity>

            <a-entity id="guitar-group" visible="false"
                gltf-model="#guitar-model"
                position="0 0.5 0" 
                scale="0.6 0.6 0.6"
                rotation="0 0 0">
            </a-entity>

            <a-entity id="Trumpet-group" visible="false"
                gltf-model="#Trumpet-model"
                position="0 0 0" 
                scale="0.3 0.3 0.3">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ปิดหน้าจอโหลดเมื่อ Assets พร้อม
        document.querySelector('a-scene').addEventListener('loaded', function () {
            document.getElementById('loading-screen').style.display = 'none';
        });

        // ข้อมูลประกอบการพรีเซนต์ (เกณฑ์ที่ 5)
        const instruments = {
            piano: { title: "🎹 Piano", desc: "เครื่องลิ่มนิ้วที่สร้างเสียงด้วยการค้อนเคาะสาย" },
            guitar: { title: "🎸 Guitar", desc: "เครื่องสายที่ใช้การดีดหรือใช้นิ้วกรีดสาย" },
            drum: { title: "🎺 Trumpet", desc: "เครื่องเป่าทองเหลืองที่มีเสียงกังวานและทรงพลัง" }
        };

        function switchInstrument(type) {
            // ปิดตัวอื่น เปิดตัวที่เลือก
            document.querySelector('#piano-group').setAttribute('visible', 'false');
            document.querySelector('#guitar-group').setAttribute('visible', 'false');
            document.querySelector('#Trumpet-group').setAttribute('visible', 'false');
            document.querySelector(`#${type}-group`).setAttribute('visible', 'true');

            // เปลี่ยนข้อความบนจอ
            document.getElementById('inst-title').innerText = instruments[type].title;
            document.getElementById('inst-desc').innerText = instruments[type].desc;
        }

        // ตรวจสอบกล้อง
        navigator.mediaDevices.getUserMedia({ video: true }).catch(err => {
            alert("ไม่สามารถเข้าถึงกล้องได้: โปรดใช้ HTTPS และกดอนุญาตกล้อง");
        });
    </script>
</body>
</html>
